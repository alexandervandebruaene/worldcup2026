<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<title>Panini WC 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap');
:root{--bg:#0a0c12;--surface:#13161f;--surface2:#1c2030;--border:#2a2f42;--text:#e8ecf5;--muted:#6b7491;--accent:#e8b84b;--green:#3ecf7a;--red:#e8504b;--blue:#4b8ce8;--purple:#9b59e8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:calc(var(--vh,1vh)*100);overflow-x:hidden;}
header{background:linear-gradient(135deg,#1a0e00 0%,#0a0c12 50%,#00111a 100%);border-bottom:2px solid var(--accent);padding:12px 18px;padding-top:max(12px,env(safe-area-inset-top));padding-left:max(18px,env(safe-area-inset-left));padding-right:max(18px,env(safe-area-inset-right));display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:100;}
.header-title{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:3px;color:var(--accent);}
.header-title span{color:#fff;}
.main-nav{display:flex;gap:4px;}
.nav-btn{padding:7px 14px;border-radius:8px;border:1px solid transparent;cursor:pointer;font-weight:600;font-size:.8rem;background:transparent;color:var(--muted);transition:all .15s;}
.nav-btn:hover{color:var(--text);border-color:var(--border);}
.nav-btn.active{background:var(--accent);color:#000;border-color:var(--accent);}
.profile-area{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.btn{padding:7px 13px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:.8rem;transition:all .15s;}
.btn-accent{background:var(--accent);color:#000;}.btn-accent:hover{filter:brightness(1.15);}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text);}.btn-outline:hover{border-color:var(--accent);color:var(--accent);}
.btn-green{background:var(--green);color:#000;}.btn-red{background:var(--red);color:#fff;}
.btn-sm{padding:4px 9px;font-size:.73rem;}
.live-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(62,207,122,.1);border:1px solid rgba(62,207,122,.3);color:var(--green);font-size:.68rem;font-weight:600;padding:3px 7px;border-radius:20px;}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse-s .9s ease-in-out infinite;}
@keyframes pulse-s{0%,100%{opacity:1;}50%{opacity:.3;}}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);display:inline-block;margin-right:3px;transition:background .3s;}
.sync-dot.ok{background:var(--green);}.sync-dot.syncing{background:var(--accent);animation:pulse-s .7s ease-in-out infinite;}.sync-dot.err{background:var(--red);}
.stats-bar{display:flex;gap:14px;font-size:.76rem;color:var(--muted);flex-wrap:wrap;align-items:center;}
.stats-bar strong{color:var(--text);font-size:.92rem;}
.app-layout{display:flex;height:calc(var(--vh,1vh)*100 - 58px);min-height:0;overflow:hidden;}
.sidebar{width:220px;min-width:170px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;-webkit-overflow-scrolling:touch;flex-shrink:0;}
.sidebar::-webkit-scrollbar{width:3px;}.sidebar::-webkit-scrollbar-thumb{background:var(--border);}
.sidebar-search{padding:9px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:10;}
.sidebar-search input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 9px;border-radius:6px;font-size:16px;}
.sidebar-search input:focus{outline:none;border-color:var(--accent);}
.group-label{padding:7px 11px 3px;font-size:.66rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:600;}
.country-item{display:flex;align-items:center;gap:6px;padding:6px 10px;cursor:pointer;transition:background .1s;border-left:3px solid transparent;}
.country-item:hover{background:var(--surface2);}.country-item.active{background:var(--surface2);border-left-color:var(--accent);}
.country-flag{font-size:1rem;}.country-name{font-size:.8rem;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.country-progress{font-size:.7rem;color:var(--muted);white-space:nowrap;}.country-progress.complete{color:var(--green);}
.progress-mini{height:3px;background:var(--border);border-radius:2px;overflow:hidden;width:32px;}
.progress-mini-fill{height:100%;border-radius:2px;transition:width .3s;}
.main-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;min-height:0;}
.main-content{max-height:calc(var(--vh,1vh)*100 - 58px);}.main-content::-webkit-scrollbar{width:5px;}.main-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.country-hero{padding:18px 22px 14px;background:linear-gradient(135deg,var(--c1,#1a1f2e) 0%,var(--c2,#0a0c12) 100%);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.hero-flag{font-size:2.5rem;}.hero-name{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:2px;color:#fff;}
.hero-sub{font-size:.8rem;color:rgba(255,255,255,.6);margin-top:1px;}
.hero-progress-wrap{margin-left:auto;text-align:right;}
.hero-percent{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--accent);}
.hero-bar{width:120px;height:5px;background:rgba(255,255,255,.15);border-radius:3px;overflow:hidden;margin-left:auto;}
.hero-bar-fill{height:100%;border-radius:3px;background:var(--accent);transition:width .4s;}
.tab-bar{display:flex;gap:3px;padding:9px 16px 0;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.tab{padding:6px 14px;border-radius:6px 6px 0 0;cursor:pointer;font-size:.8rem;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;}
.tab:hover{color:var(--text);}.tab.active{color:var(--accent);border-bottom-color:var(--accent);background:var(--surface2);}
.tab .badge{display:inline-block;background:var(--accent);color:#000;font-size:.6rem;font-weight:700;padding:1px 4px;border-radius:10px;margin-left:3px;}
.tab-content{display:none;}.tab-content.active{display:block;}
.sticker-area{padding:14px;flex:1;}
.stickers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(68px,1fr));gap:8px;}
.sticker-card{aspect-ratio:2/3;border-radius:7px;border:2px solid var(--border);background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;user-select:none;padding:3px 2px 20px;}
.sticker-card:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(0,0,0,.4);}
.sticker-card.missing{opacity:.5;}.sticker-card.have{border-color:var(--green);background:linear-gradient(160deg,var(--c1,#0a3020) 0%,var(--c2,#0a1a14) 100%);opacity:1;}
.sticker-card.double{border-color:var(--accent);background:linear-gradient(160deg,var(--c1,#2a1800) 0%,var(--c2,#1a1000) 100%);opacity:1;animation:pulse-double 2s ease-in-out infinite;}
@keyframes pulse-double{0%,100%{box-shadow:0 0 0 0 rgba(232,184,75,.3);}50%{box-shadow:0 0 10px 3px rgba(232,184,75,.2);}}
.sticker-card.foil::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 30%,rgba(255,255,255,.08) 50%,transparent 70%);pointer-events:none;}
.sticker-num{font-family:'Bebas Neue',sans-serif;font-size:.75rem;color:rgba(255,255,255,.5);line-height:1;}
.sticker-card.have .sticker-num,.sticker-card.double .sticker-num{color:rgba(255,255,255,.8);}
.sticker-card.foil .sticker-num{color:var(--accent);}
.sticker-icon{font-size:1.3rem;line-height:1;margin:2px 0;}
.sticker-name{font-size:.44rem;text-align:center;color:var(--muted);line-height:1.2;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 2px;}
.sticker-card.have .sticker-name{color:rgba(255,255,255,.7);}.sticker-card.double .sticker-name{color:rgba(232,184,75,.9);}
.sticker-state-icon{position:absolute;top:2px;right:2px;font-size:.6rem;}
.sticker-actions{position:absolute;bottom:0;left:0;right:0;display:flex;transform:translateY(100%);transition:transform .15s;}
.sticker-card:hover .sticker-actions{transform:translateY(0);}
.sticker-action-btn{flex:1;padding:4px 0;font-size:.56rem;font-weight:700;border:none;cursor:pointer;color:#fff;text-align:center;}
.sa-have{background:var(--green);color:#000;}.sa-double{background:var(--accent);color:#000;}.sa-remove{background:#444;}
.exchange-empty{text-align:center;padding:40px 20px;color:var(--muted);}
.exchange-empty .big{font-size:2.5rem;margin-bottom:8px;}
.exchange-grid{display:flex;flex-direction:column;gap:9px;}
.exchange-row{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:11px 13px;display:flex;align-items:center;gap:11px;flex-wrap:wrap;}
.exchange-row:hover{border-color:var(--accent);}
.exchange-sticker-chip{display:inline-flex;align-items:center;gap:4px;background:var(--surface2);border-radius:20px;padding:3px 8px;font-size:.75rem;font-weight:600;border:1px solid var(--border);}
.ex-arrow{color:var(--accent);font-size:1rem;}
.exchange-desc{flex:1;font-size:.8rem;}.exchange-desc strong{color:var(--accent);}
.exchange-desc small{color:var(--muted);font-size:.7rem;display:block;margin-top:2px;}
.world-map-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(124px,1fr));gap:7px;padding:13px;}
.overview-card{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:11px;display:flex;align-items:center;gap:9px;cursor:pointer;transition:all .15s;}
.overview-card:hover{border-color:var(--accent);transform:translateY(-1px);}
.ov-name{font-weight:600;font-size:.82rem;}.ov-stats{font-size:.7rem;color:var(--muted);margin-top:1px;}
.ov-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:4px;}
.ov-bar-fill{height:100%;border-radius:2px;}
.ov-badge-double{margin-left:auto;background:var(--accent);color:#000;font-size:.66rem;font-weight:700;padding:2px 5px;border-radius:10px;white-space:nowrap;}
.bracket-page{padding:0;flex:1;}
.bracket-header{padding:18px 22px 14px;background:linear-gradient(135deg,#0d1a00 0%,#0a0c12 100%);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.bracket-section{padding:14px 20px;}
.bracket-section-title{font-family:'Bebas Neue',sans-serif;font-size:1.15rem;letter-spacing:2px;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.bracket-section-title .pts{font-size:.72rem;font-family:'Inter',sans-serif;background:var(--surface2);border:1px solid var(--border);padding:2px 7px;border-radius:12px;color:var(--muted);}
.group-pred-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:9px;}
.group-pred-card{background:var(--surface);border:1px solid var(--border);border-radius:9px;overflow:hidden;}
.group-pred-header{padding:7px 11px;background:var(--surface2);border-bottom:1px solid var(--border);font-family:'Bebas Neue',sans-serif;font-size:.92rem;letter-spacing:1.5px;color:var(--accent);}
.group-team-row{display:flex;align-items:center;gap:7px;padding:6px 11px;cursor:pointer;transition:background .1s;border-left:3px solid transparent;}
.group-team-row:hover:not(.gdisabled){background:rgba(255,255,255,.03);}
.group-team-row.q1{border-left-color:var(--green);background:rgba(62,207,122,.06);}
.group-team-row.q2{border-left-color:var(--blue);background:rgba(75,140,232,.06);}
.group-team-row.gdisabled{cursor:default;}
.group-team-flag{font-size:.88rem;}.group-team-name{font-size:.76rem;flex:1;}
.group-rank-badge{width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:700;flex-shrink:0;}
.rank-1{background:var(--green);color:#000;}.rank-2{background:var(--blue);color:#fff;}.rank-other{background:var(--border);color:var(--muted);}
.ko-pick-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 10px;cursor:pointer;transition:all .15s;min-width:140px;}
.ko-pick-card:hover:not(.kdisabled){border-color:var(--accent);transform:translateY(-1px);}
.ko-pick-card.kdisabled{cursor:default;}
.ko-pick-card.kcorrect{border-color:var(--green);background:rgba(62,207,122,.07);}
.ko-pick-card.kwrong{border-color:var(--red);opacity:.75;}
.leaderboard-page{padding:18px 22px;}
.leaderboard-title{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:2px;color:var(--accent);margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.lb-table{width:100%;border-collapse:collapse;}
.lb-table th{text-align:left;padding:7px 13px;font-size:.68rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);border-bottom:2px solid var(--border);}
.lb-table td{padding:9px 13px;border-bottom:1px solid var(--border);font-size:.86rem;vertical-align:middle;}
.lb-table tr:hover td{background:var(--surface2);}
.lb-rank{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--muted);}
.lb-rank.gold{color:#ffd700;}.lb-rank.silver{color:#c0c0c0;}.lb-rank.bronze{color:#cd7f32;}
.lb-name{font-weight:600;}.lb-name.me{color:var(--accent);}
.lb-pts{font-family:'Bebas Neue',sans-serif;font-size:1.35rem;}
.lb-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:3px;width:100px;}
.lb-bar-fill{height:100%;border-radius:2px;background:var(--accent);}
.breakdown-pill{display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:1px 6px;font-size:.66rem;color:var(--muted);margin:0 2px;}
.locked-banner{background:rgba(232,80,75,.1);border:1px solid rgba(232,80,75,.3);color:var(--red);padding:9px 14px;border-radius:8px;font-size:.8rem;margin-bottom:12px;}
.open-banner{background:rgba(62,207,122,.07);border:1px solid rgba(62,207,122,.3);color:var(--green);padding:9px 14px;border-radius:8px;font-size:.8rem;margin-bottom:12px;}
.admin-section{background:rgba(155,89,232,.06);border:1px solid rgba(155,89,232,.25);border-radius:10px;padding:14px;margin-bottom:14px;}
.admin-title{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;color:var(--purple);margin-bottom:10px;}
.modal-backdrop{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:500;align-items:center;justify-content:center;-webkit-overflow-scrolling:touch;}
.modal-backdrop.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:22px;max-width:520px;width:93%;animation:modal-in .2s ease;max-height:88vh;overflow-y:auto;}
@keyframes modal-in{from{transform:scale(.9) translateY(20px);opacity:0;}to{transform:scale(1) translateY(0);opacity:1;}}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:1.25rem;letter-spacing:2px;color:var(--accent);margin-bottom:11px;}
.modal-body{font-size:.85rem;line-height:1.6;color:var(--muted);margin-bottom:13px;}
.modal-input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:8px;font-size:16px;margin-bottom:8px;}
.modal-input:focus{outline:none;border-color:var(--accent);}
.modal-actions{display:flex;gap:7px;justify-content:flex-end;margin-top:10px;}
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;min-height:calc(var(--vh,1vh)*100);background:var(--bg);padding:20px;padding-bottom:max(20px,env(safe-area-inset-bottom));}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px 24px 32px;max-width:370px;width:100%;text-align:center;position:relative;}
.login-logo{font-size:3.5rem;margin-bottom:9px;}
.login-title{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:3px;color:var(--accent);margin-bottom:6px;}
.login-sub{color:var(--muted);font-size:.83rem;margin-bottom:22px;line-height:1.6;}
.login-input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:9px;font-size:16px;margin-bottom:11px;text-align:center;letter-spacing:1px;}
.login-input:focus{outline:none;border-color:var(--accent);}
.login-profile-btn{display:block;width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:7px;cursor:pointer;margin-bottom:5px;font-size:.85rem;font-weight:500;transition:all .15s;text-align:left;}
.login-profile-btn:hover{border-color:var(--accent);color:var(--accent);}
.login-or{color:var(--muted);font-size:.73rem;text-transform:uppercase;letter-spacing:1px;margin:11px 0 8px;position:relative;}
.login-or::before,.login-or::after{content:'';position:absolute;top:50%;width:37%;height:1px;background:var(--border);}
.login-or::before{left:0;}.login-or::after{right:0;}
.toast-container{position:fixed;bottom:16px;right:16px;z-index:1000;display:flex;flex-direction:column;gap:6px;}
.toast{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:9px 13px;font-size:.79rem;animation:toast-in .3s ease,toast-out .3s ease 2.7s forwards;min-width:185px;}
.toast.success{border-left:3px solid var(--green);}.toast.info{border-left:3px solid var(--blue);}.toast.warning{border-left:3px solid var(--accent);}
@keyframes toast-in{from{transform:translateX(40px);opacity:0;}to{transform:translateX(0);opacity:1;}}
@keyframes toast-out{from{opacity:1;}to{opacity:0;transform:translateX(40px);}}
.welcome-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:34px;text-align:center;gap:14px;}
.welcome-title{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;letter-spacing:4px;background:linear-gradient(135deg,var(--accent),#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.welcome-sub{color:var(--muted);max-width:350px;line-height:1.7;font-size:.85rem;}

/* ── iOS / Mobile Safari fixes ── */
@supports (-webkit-touch-callout: none) {
  .app-layout { height: calc(var(--vh,1vh)*100 - 58px); }
  .sidebar, .main-content { -webkit-overflow-scrolling: touch; }
}
/* Prevent tap highlight on interactive elements */
button, .country-item, .sticker-card, .overview-card, .group-team-row, .ko-pick-card, .match-team {
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
/* Mobile layout improvements */
@media(max-width:480px) {
  header { padding: 10px 12px; gap: 8px; }
  .main-nav .nav-btn { padding: 6px 10px; font-size: .73rem; }
  .hero-flag { font-size: 2rem; }
  .hero-name { font-size: 1.4rem; }
  .hero-percent { font-size: 1.6rem; }
  .stickers-grid { grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 6px; }
  .group-pred-grid { grid-template-columns: 1fr 1fr; }
  .world-map-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
  .lb-table { font-size: .78rem; }
  .lb-table th, .lb-table td { padding: 7px 8px; }
  .lb-bar { width: 70px; }
}
@media(max-width:380px) {
  .main-nav .nav-btn { padding: 5px 7px; font-size: .68rem; }
  .group-pred-grid { grid-template-columns: 1fr; }
  .stats-bar { display: none; }
}

@media(max-width:560px){.sidebar{width:48px;min-width:48px;}.country-name,.country-progress,.progress-mini{display:none;}.stats-bar,.main-nav{display:none;}}
</style>
</head>
<body>
<!-- LOGIN -->
<div id="login-screen" class="login-screen">
  <div class="login-card">
    <div class="login-logo">⚽</div>
    <div class="login-title">PANINI WC 2026</div>
    <div class="login-sub">Sticker tracker + prediction contest. All data syncs live.</div>
    <div id="login-existing"></div>
    <div class="login-or" id="login-or-divider">or enter your name</div>
    <input
        type="text"
        class="login-input"
        id="login-name-input"
        placeholder="Type your name + press Enter"
        maxlength="30"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="words"
        spellcheck="false"
        enterkeyhint="go"
        onkeydown="if(event.key==='Enter'){event.preventDefault();doLogin();}"
        style="display:block;width:100%;margin-bottom:10px;font-size:16px;">
      <button
        type="button"
        onclick="doLogin()"
        style="display:block;width:100%;padding:16px;font-size:17px;font-weight:700;border:none;border-radius:10px;background:var(--accent);color:#000;cursor:pointer;-webkit-appearance:none;appearance:none;">
        &#9654; Start
      </button>
    <div id="login-status" style="margin-top:10px;font-size:.75rem;color:var(--muted);min-height:16px;text-align:center;"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none">
  <header>
    <div class="header-title">&#9917; PANINI <span>WC 2026</span></div>
    <div class="main-nav">

const STORAGE_KEY='panini-wc2026-v5';
let sharedData={profiles:{},bracket:{locked:false,adminResults:{}}};
let currentUser=null,currentView='stickers',pollInterval=null;

async function loadShared(){
  setSyncState('syncing','...');
  // Try cloud storage first
  if(typeof window.storage !== 'undefined'){
    try{
      const r = await window.storage.get(STORAGE_KEY, true);
      if(r && r.value){
        mergeData(JSON.parse(r.value));
        try{ localStorage.setItem(STORAGE_KEY, r.value); }catch(e){}
        setSyncState('ok','Live');
        return true;
      }
    }catch(e){ /* fall through */ }
  }
  // Fall back to localStorage
  try{
    const local = localStorage.getItem(STORAGE_KEY);
    if(local){ mergeData(JSON.parse(local)); setSyncState('err','Local'); return true; }
  }catch(e){}
  setSyncState('err','New');
  return false;
}
function mergeData(d){
  if(!d) return;
  sharedData.profiles = d.profiles || {};
  sharedData.bracket  = d.bracket  || { locked:false, adminResults:{} };
  if(!sharedData.bracket.adminResults) sharedData.bracket.adminResults = {};
}

async function saveShared(){
  const payload = JSON.stringify(sharedData);
  // Always write localStorage immediately
  try{ localStorage.setItem(STORAGE_KEY, payload); }catch(e){}
  // Then try cloud
  if(typeof window.storage !== 'undefined'){
    try{
      await window.storage.set(STORAGE_KEY, payload, true);
      setSyncState('ok','Saved');
    }catch(e){ setSyncState('err','Local only'); }
  } else {
    setSyncState('err','Local only');
  }
}

function setSyncState(s,l){
  try{
    const d=document.getElementById('sync-dot'),lb=document.getElementById('sync-label');
    if(d)d.className='sync-dot '+s;
    if(lb)lb.textContent=l;
  }catch(e){}
}
function startPolling(){
  if(typeof window.storage === 'undefined') return; // No cloud storage — skip polling
  if(pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(async()=>{
    const before = JSON.stringify(sharedData);
    await loadShared();
    const after = JSON.stringify(sharedData);
    if(before !== after){
      renderSidebar(); updateGlobalStats();
      if(currentView==='bracket') renderBracket();
      else if(currentView==='leaderboard') renderLeaderboard();
      else if(appState.currentCountry) renderCountryStickers(appState.currentCountry);
      toast('Updated by another player','info');
    }
  }, 9000);
}

function initLogin(){
  // Render the login UI immediately — don't wait for storage
  renderLoginUI();
  // Then load data in background and re-render if new profiles appear
  loadShared().then(() => renderLoginUI()).catch(() => {});
}

function renderLoginUI(){
  const names    = Object.keys(sharedData.profiles);
  const container= document.getElementById('login-existing');
  const divider  = document.getElementById('login-or-divider');
  const status   = document.getElementById('login-status');
  if(!container) return;

  // Clear and rebuild existing-player buttons
  container.innerHTML = '';
  if(names.length > 0){
    const label = document.createElement('div');
    label.style.cssText = 'margin-bottom:6px;font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;';
    label.textContent = 'Tap your name to join';
    container.appendChild(label);

    names.forEach(function(n){
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'login-profile-btn';
      btn.textContent = (n === ADMIN_NAME ? '👑 ' : '👤 ') + n;
      btn.style.cursor = 'pointer';
      btn.addEventListener('click', function(){ loginAs(n); });
      container.appendChild(btn);
    });

    if(divider) divider.style.display = 'block';
  } else {
    if(divider) divider.style.display = 'none';
  }

  if(status) status.textContent = names.length > 0
    ? names.length + ' player' + (names.length !== 1 ? 's' : '') + ' in session'
    : 'Enter your name to start';
}

function loginAs(n){
  if(_loginInProgress) return;
  _loginInProgress = true;
  currentUser = n;
  startApp();
  saveShared();
  setTimeout(()=>{ _loginInProgress=false; }, 2000);
}
let _loginInProgress = false;
function doLogin() {
  if (_loginInProgress) return;
  const inp = document.getElementById('login-name-input');
  const name = inp ? inp.value.trim() : '';
  if (!name) {
    if (inp) { inp.focus(); inp.style.borderColor = 'var(--red)'; setTimeout(() => inp.style.borderColor = '', 1000); }
    return;
  }
  _loginInProgress = true;
  currentUser = name;
  if (!sharedData.profiles[name]) {
    sharedData.profiles[name] = { have: {}, doubles: {}, predictions: {} };
  }
  // Start the app immediately — save in background
  startApp();
  saveShared().catch(() => {});
  setTimeout(() => { _loginInProgress = false; }, 2000);
}
// Keep loginOrCreate as alias for compatibility
function loginOrCreate() { doLogin(); }
function startApp(){
  // Hide login
  var ls = document.getElementById('login-screen');
  if(ls) ls.style.display = 'none';
  // Show app
  var app = document.getElementById('app');
  if(app) app.style.display = 'block';

  var badge = document.getElementById('current-user-badge');
  if(badge) badge.textContent = '👤 ' + currentUser + (isAdmin() ? ' 👑' : '');

  var vs = document.getElementById('view-stickers');
  var vb = document.getElementById('view-bracket');

}

// STICKER SYSTEM
// ═══════════════════════════════════════════════════
function getTeamStickers(code){return Array.from({length:20},(_,i)=>({num:i+1,foil:i===0||i===1,name:STICKER_NAMES[i]||'Player'}));}

async function toggleSticker(code,num,action){
  const have=[...getHave(currentUser,code)],dubs=[...getDoubles(currentUser,code)];
  const inH=have.includes(num),inD=dubs.includes(num);
  if(action==='have'){
    if(!inH){have.push(num);toast('✓ '+code+num+' added','success');}
    else if(!inD){dubs.push(num);toast('⭐ '+code+num+' double','warning');}
    else{have.splice(have.indexOf(num),1);dubs.splice(dubs.indexOf(num),1);toast('✕ '+code+num+' removed','info');}
  }else if(action==='set-have'){if(!inH)have.push(num);const di=dubs.indexOf(num);if(di>-1)dubs.splice(di,1);}
  else if(action==='set-double'){if(!inH)have.push(num);if(!inD)dubs.push(num);}
  else if(action==='remove'){const hi=have.indexOf(num);if(hi>-1)have.splice(hi,1);const di=dubs.indexOf(num);if(di>-1)dubs.splice(di,1);}
  setHave(code,have);setDoubles(code,dubs);
  renderCountryStickers(code);updateSidebarItem(code);updateGlobalStats();
  await saveShared();
}

function renderCountryStickers(code){
  const team=TEAMS.find(t=>t.code===code);if(!team)return;
  const have=getHave(currentUser,code),dubs=getDoubles(currentUser,code),pct=Math.round(have.length/20*100);
  const exCt=getExchangeCount(code);
  document.getElementById('main-content').innerHTML=
    '<div class="country-hero" style="--c1:'+team.c1+'aa;--c2:'+team.c2+'77;">'+
    '<div class="hero-flag">'+team.flag+'</div>'+
    '<div><div class="hero-name">'+team.name+'</div><div class="hero-sub">Group '+team.group+' &middot; '+have.length+'/20 &middot; '+dubs.length+' doubles</div></div>'+
    '<div class="hero-progress-wrap"><div class="hero-percent">'+pct+'%</div><div class="hero-bar"><div class="hero-bar-fill" style="width:'+pct+'%"></div></div></div></div>'+
    '<div class="tab-bar">'+
    '<div class="tab '+(appState.currentTab==='stickers'?'active':'')+'" onclick="setTab(\'stickers\',\''+code+'\')">All (20)</div>'+
    '<div class="tab '+(appState.currentTab==='missing'?'active':'')+'" onclick="setTab(\'missing\',\''+code+'\')">Missing ('+(20-have.length)+')</div>'+
    '<div class="tab '+(appState.currentTab==='doubles'?'active':'')+'" onclick="setTab(\'doubles\',\''+code+'\')">Doubles'+(dubs.length>0?'<span class="badge">'+dubs.length+'</span>':' (0)')+'</div>'+
    '<div class="tab '+(appState.currentTab==='exchange'?'active':'')+'" onclick="setTab(\'exchange\',\''+code+'\')">Trades'+(exCt>0?'<span class="badge">'+exCt+'</span>':'')+'</div></div>'+
    '<div class="sticker-area">'+
    '<div class="tab-content '+(appState.currentTab==='stickers'?'active':'')+'">'+renderStickerGrid(code,'all',team)+'</div>'+
    '<div class="tab-content '+(appState.currentTab==='missing'?'active':'')+'">'+renderStickerGrid(code,'missing',team)+'</div>'+
    '<div class="tab-content '+(appState.currentTab==='doubles'?'active':'')+'">'+renderStickerGrid(code,'doubles',team)+'</div>'+
    '<div class="tab-content '+(appState.currentTab==='exchange'?'active':'')+'">'+renderExchangeTab(code,team)+'</div></div>';
}

function renderStickerGrid(code,filter,team){
  const have=getHave(currentUser,code),dubs=getDoubles(currentUser,code);
  const stickers=getTeamStickers(code);
  let fl=filter==='missing'?stickers.filter(s=>!have.includes(s.num)):filter==='doubles'?stickers.filter(s=>dubs.includes(s.num)):stickers;
  if(!fl.length)return'<div style="text-align:center;padding:40px 20px;color:var(--muted)"><div style="font-size:2.5rem;margin-bottom:8px">'+(filter==='missing'?'🎉':'📦')+'</div>'+(filter==='missing'?'Complete!':'No doubles yet')+'</div>';
  return'<div class="stickers-grid">'+fl.map(s=>{
    const inH=have.includes(s.num),inD=dubs.includes(s.num);
    let cls=inD?'double':inH?'have':'missing';if(s.foil)cls+=' foil';
    return'<div class="sticker-card '+cls+'" onclick="toggleSticker(\''+code+'\','+s.num+',\'have\')" '+(inH?'style="--c1:'+team.c1+'cc;--c2:'+team.c2+'88;"':'')+'>'+
      '<span class="sticker-state-icon">'+(inD?'⭐':inH?'✓':'')+'</span>'+
      '<span class="sticker-num">'+code+s.num+(s.foil?'✦':'')+'</span>'+
      '<span class="sticker-icon">'+team.flag+'</span>'+
      '<span class="sticker-name">'+s.name+'</span>'+
      '<div class="sticker-actions">'+
      '<button class="sticker-action-btn sa-have" onclick="event.stopPropagation();toggleSticker(\''+code+'\','+s.num+',\'set-have\')">&#10003;</button>'+
      '<button class="sticker-action-btn sa-double" onclick="event.stopPropagation();toggleSticker(\''+code+'\','+s.num+',\'set-double\')">&times;2</button>'+
      '<button class="sticker-action-btn sa-remove" onclick="event.stopPropagation();toggleSticker(\''+code+'\','+s.num+',\'remove\')">&#10005;</button>'+
      '</div></div>';
  }).join('')+'</div>';
}
function setTab(tab,code){appState.currentTab=tab;renderCountryStickers(code);}

function getExchangeCount(code){
  let ct=0;const myD=getDoubles(currentUser,code),myM=getTeamStickers(code).map(s=>s.num).filter(n=>!getHave(currentUser,code).includes(n));
  Object.keys(sharedData.profiles).filter(p=>p!==currentUser).forEach(o=>{
    const thD=getDoubles(o,code),thM=getTeamStickers(code).map(s=>s.num).filter(n=>!getHave(o,code).includes(n));
    ct+=Math.min(myD.filter(n=>thM.includes(n)).length,thD.filter(n=>myM.includes(n)).length);});
  return ct;
}
function renderExchangeTab(code,team){
  const others=Object.keys(sharedData.profiles).filter(p=>p!==currentUser);
  if(!others.length)return'<div class="exchange-empty"><div class="big">👥</div>No other players yet.</div>';
  const myD=getDoubles(currentUser,code),myM=getTeamStickers(code).map(s=>s.num).filter(n=>!getHave(currentUser,code).includes(n));
  let html='',any=false;
  others.forEach(o=>{
    const thD=getDoubles(o,code),thM=getTeamStickers(code).map(s=>s.num).filter(n=>!getHave(o,code).includes(n));
    const iG=myD.filter(n=>thM.includes(n)),thG=thD.filter(n=>myM.includes(n));
    const mc=Math.min(iG.length,thG.length);
    for(let i=0;i<mc;i++){any=true;html+='<div class="exchange-row"><div><div style="font-size:.68rem;color:var(--muted);margin-bottom:3px">Give <strong>'+o+'</strong></div><span class="exchange-sticker-chip">'+team.flag+' '+code+iG[i]+'</span></div><div class="ex-arrow">⇄</div><div><div style="font-size:.68rem;color:var(--muted);margin-bottom:3px"><strong>'+o+'</strong> gives</div><span class="exchange-sticker-chip">'+team.flag+' '+code+thG[i]+'</span></div><button class="btn btn-green btn-sm" style="margin-left:auto" onclick="acceptExchange(\''+code+'\','+iG[i]+','+thG[i]+',\''+o.replace(/'/g,"\\'")+'\')" >✓</button></div>';}
    if(!mc&&iG.length){any=true;html+='<div class="exchange-row"><div class="exchange-desc"><strong>'+o+'</strong> needs your doubles<small>'+iG.slice(0,5).map(n=>code+n).join(' · ')+'</small></div></div>';}
    if(!mc&&thG.length){any=true;html+='<div class="exchange-row"><div class="exchange-desc"><strong>'+o+'</strong> has doubles you need<small>'+thG.slice(0,5).map(n=>code+n).join(' · ')+'</small></div></div>';}
  });
  if(!any)return'<div class="exchange-empty"><div class="big">🤷</div>No trades possible right now</div>';
  return'<div class="exchange-grid">'+html+'</div>';
}
async function acceptExchange(code,giveNum,getNum,other){
  const mH=[...getHave(currentUser,code)],mD=[...getDoubles(currentUser,code)];
  const di=mD.indexOf(giveNum);if(di>-1)mD.splice(di,1);setHave(code,mH);setDoubles(code,mD);
  const tH=[...getHave(other,code)],tD=[...getDoubles(other,code)];
  if(!tH.includes(giveNum))tH.push(giveNum);const tdi=tD.indexOf(giveNum);if(tdi>-1)tD.splice(tdi,1);
  sharedData.profiles[other].have[code]=tH;sharedData.profiles[other].doubles[code]=tD;
  const mH2=[...getHave(currentUser,code)];if(!mH2.includes(getNum))mH2.push(getNum);setHave(code,mH2);
  const tD2=[...getDoubles(other,code)];const tdi2=tD2.indexOf(getNum);if(tdi2>-1)tD2.splice(tdi2,1);sharedData.profiles[other].doubles[code]=tD2;
  await saveShared();toast('✅ Traded '+code+giveNum+' ⇄ '+code+getNum+' with '+other,'success');
  renderCountryStickers(code);updateSidebarItem(code);updateGlobalStats();
}

// GROUP QUALIFIER TOGGLE
function toggleGroupPred(group,code){
  if(locked())return;
  const key='group_'+group;const pred=[...(getMyPreds()[key]||[])];
  const idx=pred.indexOf(code);
  if(idx===-1){if(pred.length<2)pred.push(code);else pred[1]=code;}else pred.splice(idx,1);
  setPred(key,pred);renderBracket();scheduleSave();
}

// SCORING
// ═══════════════════════════════════════════════════
function calcScore(user){
  const preds=getPreds(user);const ar=sharedData.bracket.adminResults;
  let total=0;const bd={group:0,r32:0,r16:0,qf:0,sf:0,final:0,winner:0};
  GROUPS.forEach(g=>{
    const myP=preds['group_'+g]||[];const res=ar['group_'+g]||[];
    myP.forEach(c=>{if(res.includes(c)){total+=ROUND_PTS.group;bd.group+=ROUND_PTS.group;}});
  });
  ROUNDS.forEach(round=>{
    for(let i=0;i<round.count;i++){
      const p=preds[round.key+'_'+i];const r=ar[round.key+'_'+i];
      if(p&&r&&p===r){total+=ROUND_PTS[round.key];bd[round.key]+=ROUND_PTS[round.key];}
    }
  });
  const p=preds['winner'];const r=ar['winner'];if(p&&r&&p===r){total+=ROUND_PTS.winner;bd.winner+=ROUND_PTS.winner;}
  return{total,breakdown:bd};
}

  if(!players.length){html+='<p style="color:var(--muted)">No players yet.</p>';document.getElementById('leaderboard-content').innerHTML=html;return;}
  const maxPts=Math.max(...scores.map(s=>s.total),1);

    html+='<tr><td><span class="lb-rank '+rc+'">'+(rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':rank)+'</span></td>'+

      '<td><div class="lb-pts">'+s.total+'</div></td>'+
      '<td>'+[['group','Grp'],['r32','R32'],['r16','R16'],['qf','QF'],['sf','SF'],['final','F'],['winner','🏆']].map(([k,l])=>bd[k]?'<span class="breakdown-pill">'+l+' '+bd[k]+'</span>':'').join('')+(s.total===0&&!hasResults?'<span style="color:var(--muted);font-size:.72rem">No results yet</span>':'')+'</td></tr>';

  document.getElementById('leaderboard-content').innerHTML=html;
}

  let html='';

    html+='<div class="group-label">Group '+g+'</div>';
    groups[g].forEach(t=>{
      const have=getHave(currentUser,t.code).length,pct=Math.round(have/20*100),dubs=getDoubles(currentUser,t.code).length;
      html+='<div class="country-item '+(appState.currentCountry===t.code?'active':'')+'" id="sidebar-'+t.code+'" onclick="selectCountry(\''+t.code+'\')">'+
        '<span class="country-flag">'+t.flag+'</span>'+
        '<span class="country-name">'+t.name+'</span>'+
        '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">'+
        '<div class="progress-mini"><div class="progress-mini-fill" style="width:'+pct+'%;background:'+(pct===100?'var(--green)':'var(--accent)')+'"></div></div>'+
        '<span class="country-progress '+(pct===100?'complete':'')+'">'+have+'/20'+(dubs>0?' +'+dubs:'')+'</span></div></div>';
    });
  });
  document.getElementById('country-list').innerHTML=html;
}
function updateSidebarItem(code){
  const t=TEAMS.find(t=>t.code===code);if(!t)return;const item=document.getElementById('sidebar-'+code);if(!item)return;
  const have=getHave(currentUser,code).length,pct=Math.round(have/20*100),dubs=getDoubles(currentUser,code).length;
  const bar=item.querySelector('.progress-mini-fill');if(bar){bar.style.width=pct+'%';bar.style.background=pct===100?'var(--green)':'var(--accent)';}
  const prog=item.querySelector('.country-progress');if(prog){prog.textContent=have+'/20'+(dubs>0?' +'+dubs:'');prog.className='country-progress '+(pct===100?'complete':'');}
}
function filterCountries(val){renderSidebar(val);}
function selectCountry(code){
  appState.currentCountry=code;appState.currentTab='stickers';
  document.querySelectorAll('.country-item').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById('sidebar-'+code);if(el)el.classList.add('active');
  renderCountryStickers(code);
}
function showAllOverview(){
  appState.currentCountry=null;document.querySelectorAll('.country-item').forEach(el=>el.classList.remove('active'));
  let h=0,d=0;TEAMS.forEach(t=>{h+=getHave(currentUser,t.code).length;d+=getDoubles(currentUser,t.code).length;});
  document.getElementById('main-content').innerHTML=
    '<div style="padding:16px 20px 11px;background:var(--surface);border-bottom:1px solid var(--border)">'+
    '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:1.5rem;letter-spacing:2px">FULL COLLECTION — '+currentUser+'</div>'+
    '<div style="color:var(--muted);font-size:.79rem">'+h+'/980 stickers &middot; '+d+' doubles</div></div>'+
    '<div class="world-map-grid">'+TEAMS.map(t=>{
      const have=getHave(currentUser,t.code).length,dubs=getDoubles(currentUser,t.code).length,pct=Math.round(have/20*100);
      return'<div class="overview-card" onclick="selectCountry(\''+t.code+'\')"><div style="font-size:1.4rem">'+t.flag+'</div>'+
        '<div style="flex:1;min-width:0"><div class="ov-name">'+t.name+'</div><div class="ov-stats">'+have+'/20 &middot; Grp '+t.group+'</div>'+
        '<div class="ov-bar"><div class="ov-bar-fill" style="width:'+pct+'%;background:'+(pct===100?'var(--green)':pct>60?'var(--accent)':'var(--blue)')+'"></div></div></div>'+
        (dubs>0?'<div class="ov-badge-double">&times;'+dubs+'</div>':'')+'</div>';
    }).join('')+'</div>';
}
function updateGlobalStats(){
  let h=0,d=0;TEAMS.forEach(t=>{h+=getHave(currentUser,t.code).length;d+=getDoubles(currentUser,t.code).length;});
  document.getElementById('global-stats').innerHTML='<span><strong>'+h+'</strong>/980</span><span><strong>'+Math.round(h/980*100)+'%</strong></span><span><strong style="color:var(--accent)">'+d+'</strong> dubs</span>';
}
function renderAll(){renderSidebar();updateGlobalStats();}

// ═══════════════════════════════════════════════════
// MODAL HELPERS
// ═══════════════════════════════════════════════════
function openModal(title,body,actions){
  document.getElementById('modal-title-text').textContent=title;
  document.getElementById('modal-body-content').innerHTML=body;
  document.getElementById('modal-actions-area').innerHTML=actions||'<button class="btn btn-outline" onclick="closeModal()">Close</button>';
  document.getElementById('shared-modal').classList.add('open');
}
function closeModal(){document.getElementById('shared-modal').classList.remove('open');}
document.getElementById('shared-modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
function toast(msg,type){
  const c=document.getElementById('toast-container'),t=document.createElement('div');
  t.className='toast '+(type||'success');t.textContent=msg;c.appendChild(t);setTimeout(()=>t.remove(),3100);
}


// iOS viewport height fix
function setVH() {
  const vh = window.innerHeight * 0.01;
  document.documentElement.style.setProperty('--vh', vh + 'px');
}
setVH();
window.addEventListener('resize', setVH);
window.addEventListener('orientationchange', () => setTimeout(setVH, 200));

initLogin();

</script>
